<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>My Portal - 究極のイベント目録</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. ダークファンタジーデザイン
        ========================================= */
        :root {
            --bg-base: #030305;
            --surface: rgba(18, 18, 22, 0.9);
            --text-main: #E5E7EB;
            --silver: #9CA3AF;
            --rust: #5A3A22;
            --danger: #ff4d4d;
            --accent: #C5A059; 
            --accent-glow: rgba(197, 160, 89, 0.6);
            --monst-red: #8B0000;
            --dokkan-yellow: #DAA520;
            --sa-top: env(safe-area-inset-top, 0px);
            --sa-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: 'Cinzel', 'Noto Serif JP', serif;
            color: var(--text-main);
            background-color: var(--bg-base);
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            margin: 0;
            min-height: 100vh;
        }

        header {
            position: sticky; top: 0; z-index: 100;
            padding: calc(15px + var(--sa-top)) 20px 15px;
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.4rem; color: var(--accent); letter-spacing: 0.1em; text-shadow: 0 0 10px var(--accent-glow); }

        .nav-tabs { display: flex; gap: 8px; padding: 20px; justify-content: center; }
        .nav-tab { flex: 1; max-width: 120px; padding: 10px; background: #0a0a0a; border: 1px solid #333; color: var(--silver); cursor: pointer; border-radius: 4px; text-align: center; font-size: 0.8rem; }
        .nav-tab.active { border-color: var(--accent); color: var(--accent); background: var(--surface); box-shadow: 0 0 10px var(--accent-glow); }

        /* =========================================
           2. ダッシュボード表示
        ========================================= */
        .dashboard {
            padding: 0 20px calc(40px + var(--sa-bottom));
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .event-card {
            background: var(--surface);
            border: 1px solid var(--rust);
            padding: 20px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 5px 15px #000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .game-monst { border-left: 4px solid var(--monst-red); }
        .game-dokkan { border-left: 4px solid var(--dokkan-yellow); }

        .e-type { font-size: 0.7rem; color: var(--accent); letter-spacing: 1px; }
        .e-title { font-size: 1.2rem; font-weight: bold; }
        .e-desc { font-size: 0.85rem; color: var(--silver); line-height: 1.5; margin-bottom: 10px; }
        
        .e-footer { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-top: auto; }
        .c-countdown { font-family: monospace; font-size: 1rem; color: var(--accent); text-align: right; }
        .c-countdown.danger { color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">OATH & ABYSS</div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" id="tab-all" onclick="filter('all')">ALL</button>
        <button class="nav-tab" id="tab-monst" onclick="filter('monst')">MONST</button>
        <button class="nav-tab" id="tab-dokkan" onclick="filter('dokkan')">DOKKAN</button>
    </nav>

    <main class="dashboard" id="eventGrid"></main>

    <script>
        // ==========================================
        // ★ 今後はここから下のデータを直接書き換えるだけ！
        // ==========================================
        const initialEvents = [
            { id: 'm1', game: 'monst', type: 'コラボ', title: 'ファミマ×モンスト 企業コラボ', start: '2026-04-14T00:00:00', end: '2026-05-04T23:59:59', desc: '対象商品購入で限定描き下ろしグッズを獲得せよ。' },
            { id: 'm2', game: 'monst', type: 'イベント', title: '超モンストひろば in 超会議', start: '2026-04-25T00:00:00', end: '2026-04-26T23:59:59', desc: '幕張メッセにて「超・モンスト幸子祭」が降臨。' },
            { id: 'm3', game: 'monst', type: 'ガチャ', title: '12.5th Half Anniversary', start: '2026-04-02T00:00:00', end: '2026-04-30T23:59:59', desc: '特別なガチャ玉で限定★6キャラクターを引き当てろ。' },
            { id: 'm4', game: 'monst', type: 'クエスト', title: '轟絶：新なる理の体現者', start: '2026-04-20T00:00:00', end: '2026-05-05T23:59:59', desc: '世界の法則を歪める新たな轟絶が降臨。' },
            { id: 'm5', game: 'monst', type: 'キャンペーン', title: 'ストライカー応援祭', start: '2026-04-13T00:00:00', end: '2026-04-27T23:59:59', desc: '神殿ノーコン報酬でわくわくの実が2個確定。' },
            { id: 'm6', game: 'monst', type: 'クエスト', title: '絶級トーナメント', start: '2026-04-07T00:00:00', end: '2026-04-25T23:59:59', desc: '天を穿つ塔を登り詰め、多大なオーブを獲得せよ。' },
            { id: 'd1', game: 'dokkan', type: 'ガチャ', title: 'GW直前 Wドッカンフェス', start: '2026-04-28T00:00:00', end: '2026-05-15T23:59:59', desc: '新たなフェス限LRが登場。連続ガシャ3回で1回無料。' },
            { id: 'd2', game: 'dokkan', type: 'クエスト', title: '極限Zバトル：立ちはだかる守護者', start: '2026-04-10T00:00:00', end: '2026-05-10T23:59:59', desc: '限界突破の覚醒メダルを獲得せよ。' },
            { id: 'd3', game: 'dokkan', type: 'イベント', title: '第56回 天下一武道会', start: '2026-04-17T00:00:00', end: '2026-04-19T23:59:59', desc: '全世界の戦士たちとポイントを競い合え。' },
            { id: 'd4', game: 'dokkan', type: 'イベント', title: 'バーチャルドッカン大乱戦', start: '2026-04-05T00:00:00', end: '2026-05-01T23:59:59', desc: '激闘の果てに秘宝を獲得せよ。' },
            { id: 'd5', game: 'dokkan', type: 'ガチャ', title: '伝説降臨 昇龍祭', start: '2026-04-15T00:00:00', end: '2026-04-25T23:59:59', desc: 'SSR排出率が2倍に上昇。かつてない戦力を迎え入れよ。' },
            { id: 'd6', game: 'dokkan', type: 'イベント', title: 'バトルアワー2026 記念祭', start: '2026-04-18T00:00:00', end: '2026-04-20T23:59:59', desc: '世界規模の祭典。ログインで龍石と特別報酬を支給。' },
            
            // 【ここに新しいイベントを書き足すことができます】
        ];

        let currentTab = 'all';

        function render() {
            const grid = document.getElementById('eventGrid');
            grid.innerHTML = '';
            const now = new Date();

            const filtered = initialEvents.filter(ev => {
                const isTabMatch = currentTab === 'all' || ev.game === currentTab;
                const isEnded = new Date(ev.end) < now;
                return isTabMatch && !isEnded; // 終了したものは表示しない
            });

            // 終了日が近い順に並べる
            filtered.sort((a, b) => new Date(a.end) - new Date(b.end));

            filtered.forEach(ev => {
                const card = document.createElement('article');
                card.className = `event-card game-${ev.game}`;
                card.innerHTML = `
                    <div class="e-type">【${ev.type}】${ev.game.toUpperCase()}</div>
                    <div class="e-title">${ev.title}</div>
                    <div class="e-desc">${ev.desc}</div>
                    <div class="e-footer">
                        <div class="c-countdown" data-end="${ev.end}"></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filter(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.toggle('active', b.id === `tab-${tab}`));
            render();
        }

        function updateTimers() {
            const now = new Date();
            document.querySelectorAll('.c-countdown').forEach(el => {
                const end = new Date(el.dataset.end);
                const diff = end - now;
                if (diff <= 0) { el.innerText = "終了"; return; }
                const d = Math.floor(diff/864e5), h = Math.floor(diff/36e5%24), m = Math.floor(diff/6e4%60), s = Math.floor(diff/1e3%60);
                el.innerText = `${d}日 ${h}:${m}:${s}`;
                if (d === 0) el.classList.add('danger'); // 残り24時間未満で赤くする
            });
        }

        setInterval(updateTimers, 1000);
        render();
    </script>
</body>
</html>
